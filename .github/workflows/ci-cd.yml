name: CI/CD Pipeline

on:
  push:
    branches: [main]

jobs:
  test:
    name: Install & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npx jest --forceExit

  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/devops-challenge:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/devops-challenge:${{ github.sha }}

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Notify deployment
        run: |
          echo "Docker image pushed to Docker Hub successfully"
          echo "Image: ${{ secrets.DOCKERHUB_USERNAME }}/devops-challenge:latest"
          echo "Railway auto-deploys from GitHub on every push to main"
          echo "Live URL: https://devops-challenge-production.up.railway.app"